<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in — Capital Records</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="styles.css?v=17">
</head>
<body class="login-page">
  <div class="login-card">
    <h1>Capital Records</h1>
    <p class="login-sub">Enter the site password to continue.</p>
    <form id="loginForm">
      <label>Password
        <input type="password" name="password" required autofocus placeholder="••••••••">
      </label>
      <button type="submit" class="btn primary">Enter</button>
      <p id="loginError" class="login-error hidden">Incorrect password.</p>
    </form>
  </div>

  <script src="login.js?v=17"></script>
</body>
</html>
